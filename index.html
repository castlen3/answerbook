<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>答案之書</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:wght@400;600;700&family=Iansui&family=Noto+Serif+TC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #1d1a1a;
      font-family: "Iansui", "Noto Serif TC", "Songti TC", "PMingLiU", serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3vh 5vw;
      color: #fff;
      min-height: 100vh;
    }

    #bookContainer {
      position: relative;
      width: min(90vw, 650px);
      height: min(55vh, 420px);
      perspective: 1200px;
      margin-top: 2vh;
      flex-shrink: 0;
    }

    #book {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #1e3a2f 0%, #2d5a46 40%, #1e3a2f 100%);
      border: 6px solid #c9a84c;
      border-radius: 12px;
      box-shadow:
        0 0 30px rgba(201, 168, 76, 0.25),
        inset 0 0 80px rgba(0, 0, 0, 0.3),
        inset 0 0 30px rgba(201, 168, 76, 0.08);
      color: transparent;
      font-size: clamp(1.5rem, 5vw, 3rem);
      font-family: "Iansui", "Noto Serif TC", "Cinzel Decorative", "Songti TC", serif;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 1s ease-in-out, background 0.5s, color 0.5s;
      transform-origin: left;
      backface-visibility: hidden;
      position: relative;
      z-index: 2;
      text-align: center;
      background-clip: padding-box;
    }

    /* 燙金文字效果 */
    #book::before {
      content: "答案之書";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: inherit;
      font-family: inherit;
      letter-spacing: inherit;
      background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      z-index: 3;
      pointer-events: none;
      text-shadow: none;
    }

    /* 書邊角落裝飾：四角金線 */
    #book::after {
      content: "";
      position: absolute;
      inset: 8px;
      border: 2px solid rgba(201, 168, 76, 0.35);
      border-radius: 6px;
      pointer-events: none;
      z-index: 1;
    }

    /* 四角花飾 */
    #book .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #c9a84c;
      border-style: solid;
      z-index: 4;
      pointer-events: none;
      opacity: 0.6;
    }
    #book .corner.tl { top: 14px; left: 14px; border-width: 3px 0 0 3px; }
    #book .corner.tr { top: 14px; right: 14px; border-width: 3px 3px 0 0; }
    #book .corner.bl { bottom: 14px; left: 14px; border-width: 0 0 3px 3px; }
    #book .corner.br { bottom: 14px; right: 14px; border-width: 0 3px 3px 0; }

    #book.opening {
      transform: rotateY(-160deg);
    }

    #book.opened {
      transform: rotateY(-160deg);
      background: linear-gradient(160deg, #4a3d30 0%, #3d3227 50%, #4a3d30 100%);
      color: #2f2418;
      border-color: #8a7a60;
    }
    #book.opened::before {
      display: none;
    }
    #book.opened .corner {
      opacity: 0;
    }
    #book.opened::after {
      display: none;
    }

    #answer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: clamp(48px, 9vw, 78px) clamp(28px, 7vw, 58px);
      box-sizing: border-box;
      font-size: clamp(1.35rem, 5vw, 2.45rem);
      color: #2f2418;
      background:
        /* 乾淨白底，只有非常淡的泛黃與舊書邊緣陰影，不做線條/點點 */
        radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.55) 0%, transparent 58%),
        radial-gradient(ellipse at 50% 50%, transparent 62%, rgba(185, 139, 64, 0.18) 100%),
        linear-gradient(170deg, #fffaf0 0%, #f7eedc 48%, #ead6ad 100%);
      display: none;
      z-index: 1;
      border-radius: 10px;
      box-shadow:
        inset 0 0 52px rgba(145, 103, 39, 0.16),
        inset 0 0 18px rgba(255, 255, 255, 0.34);
      text-align: center;
      overflow: auto;
    }

    /* ✨ 內頁魔法書邊框：保留古書儀式感，但不做筆記本線條 */
    #answer .page-gold-frame {
      position: absolute;
      inset: clamp(12px, 3vw, 24px);
      pointer-events: none;
      z-index: 6;
      border-radius: 10px;
      border: 4px double transparent;
      border-image: linear-gradient(135deg,
        #8a5a15 0%,
        #f0d37b 20%,
        #b77c21 40%,
        #fff1b4 56%,
        #9a6418 76%,
        #e1ba5f 100%
      ) 1;
      box-shadow:
        0 0 7px rgba(156, 101, 27, 0.24),
        inset 0 0 6px rgba(255, 239, 182, 0.18);
      opacity: 0.82;
    }

    #answer .page-gold-frame::before {
      content: "";
      position: absolute;
      inset: clamp(8px, 1.7vw, 13px);
      border-radius: 7px;
      border: 1px solid rgba(130, 82, 20, 0.36);
      box-shadow: 0 0 4px rgba(255, 229, 150, 0.18);
    }

    /* 🕯️ 白色古書內頁：避免像筆記本的線條/點點，只保留柔和邊緣泛黃 */
    #answer.weathered::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      border-radius: 10px;
      background:
        radial-gradient(ellipse at var(--smudge-x, 96%) var(--smudge-y, 54%), rgba(137, 91, 33, var(--smudge-o, 0.10)) 0 10px, transparent 34px),
        linear-gradient(90deg, rgba(153, 104, 40, 0.10), transparent 12%, transparent 88%, rgba(153, 104, 40, 0.10)),
        linear-gradient(0deg, rgba(153, 104, 40, 0.10), transparent 12%, transparent 88%, rgba(153, 104, 40, 0.08));
      mix-blend-mode: multiply;
      opacity: 0.78;
    }

    #answer.weathered.wear-se::after,
    #answer.weathered.wear-nw::after,
    #answer.weathered.wear-ne::after {
      background:
        radial-gradient(ellipse at var(--smudge-x, 96%) var(--smudge-y, 54%), rgba(137, 91, 33, var(--smudge-o, 0.10)) 0 10px, transparent 34px),
        linear-gradient(90deg, rgba(153, 104, 40, 0.10), transparent 12%, transparent 88%, rgba(153, 104, 40, 0.10)),
        linear-gradient(0deg, rgba(153, 104, 40, 0.10), transparent 12%, transparent 88%, rgba(153, 104, 40, 0.08));
    }

    #book.opened+#answer {
      display: block;
    }

    #answer>div {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 5%;
      box-sizing: border-box;
      overflow-wrap: break-word;
      word-wrap: break-word;
      line-height: 1.55;
      font-family: "Iansui", "Noto Serif TC", "Songti TC", "PMingLiU", serif;
      letter-spacing: 0.045em;
    }

    /* 🌫️ 神秘翻頁掃光 */
    @keyframes magicReveal {
      0% { opacity: 1; transform: translateX(-100%); }
      40% { opacity: 0.7; }
      100% { opacity: 0; transform: translateX(120%); }
    }
    #answer.revealing {
      overflow: hidden;
    }
    #answer.revealing::before {
      content: '';
      position: absolute;
      top: 5%; left: 0;
      width: 35%;
      height: 90%;
      background: linear-gradient(90deg, 
        transparent 0%, 
        rgba(255,215,0,0.04) 30%, 
        rgba(255,215,0,0.08) 50%, 
        rgba(255,215,0,0.04) 70%, 
        transparent 100%
      );
      pointer-events: none;
      z-index: 4;
      border-radius: 10px;
      animation: magicReveal 1.8s ease-out forwards;
    }

    /* 📜 隨機紙色變化：只變泛黃位置，不加線條或點點 */
    /* 變化1：預設白色舊紙 */
    #answer.w2 {
      background:
        radial-gradient(ellipse at 35% 45%, rgba(255,255,255,0.52) 0%, transparent 58%),
        radial-gradient(ellipse at 35% 50%, transparent 60%, rgba(174, 124, 48, 0.16) 100%),
        linear-gradient(170deg, #fffbf1 0%, #f6ecd8 50%, #ead4a9 100%);
    }
    #answer.w3 {
      background:
        radial-gradient(ellipse at 50% 28%, rgba(255,255,255,0.50) 0%, transparent 56%),
        radial-gradient(ellipse at 50% 30%, transparent 62%, rgba(167, 116, 42, 0.15) 100%),
        linear-gradient(180deg, #fffdf6 0%, #f4ead6 54%, #e8d1a4 100%);
    }
    #answer.w4 {
      background:
        radial-gradient(ellipse at 72% 70%, rgba(255,255,255,0.48) 0%, transparent 58%),
        radial-gradient(ellipse at 70% 70%, transparent 62%, rgba(174, 121, 43, 0.16) 100%),
        linear-gradient(160deg, #fffaf0 0%, #f3e7d0 50%, #e7cfa1 100%);
    }

    #prompt {
      margin-top: clamp(1rem, 3vh, 1.5rem);
      font-size: clamp(0.9rem, 3.5vw, 1.4rem);
      color: #ccc;
      text-align: center;
      max-width: 600px;
    }

    button {
      margin-top: clamp(1rem, 2vh, 1.5rem);
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      padding: clamp(8px, 1.5vw, 14px) clamp(24px, 4vw, 40px);
      background-color: #fdd835;
      color: #3e2723;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #fbc02d;
    }

    @keyframes glow {
      0% {
        box-shadow: 0 0 0 rgba(255, 255, 153, 0.0);
      }

      50% {
        box-shadow: 0 0 80px 40px rgba(255, 255, 153, 0.6);
      }

      100% {
        box-shadow: 0 0 0 rgba(255, 255, 153, 0.0);
      }
    }

    #book.glow {
      animation: glow 1.5s ease-out;
    }

    /* 💕 愛心特效 */
    .heart {
      position: fixed;
      pointer-events: none;
      font-size: 24px;
      z-index: 999;
      animation: heartFloat 3s ease-out forwards;
      opacity: 0;
    }

    @keyframes heartFloat {
      0% {
        opacity: 1;
        transform: translateY(0) scale(0.5) rotate(0deg);
      }
      50% {
        opacity: 1;
        transform: translateY(-40vh) scale(1.2) rotate(20deg);
      }
      100% {
        opacity: 0;
        transform: translateY(-80vh) scale(0.8) rotate(-10deg);
      }
    }

    /* ✨ 魔法漂浮粒子 */
    h1 {
      position: relative;
      display: inline-block;
    }
    .magic-particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      filter: blur(2px);
    }
    .magic-particle.p1 {
      width: 10px; height: 10px;
      background: rgba(255, 215, 0, 0.7);
      box-shadow: 0 0 12px 3px rgba(255, 215, 0, 0.4);
      top: -10px; left: -20px;
      animation: floatP1 4s ease-in-out infinite;
    }
    .magic-particle.p2 {
      width: 6px; height: 6px;
      background: rgba(150, 200, 255, 0.6);
      box-shadow: 0 0 10px 2px rgba(150, 200, 255, 0.3);
      top: 5px; right: -25px;
      animation: floatP2 5s ease-in-out infinite 0.5s;
    }
    .magic-particle.p3 {
      width: 8px; height: 8px;
      background: rgba(200, 150, 255, 0.6);
      box-shadow: 0 0 10px 2px rgba(200, 150, 255, 0.3);
      top: -5px; left: 10px;
      animation: floatP3 4.5s ease-in-out infinite 1s;
    }
    .magic-particle.p4 {
      width: 5px; height: 5px;
      background: rgba(255, 200, 100, 0.6);
      box-shadow: 0 0 8px 2px rgba(255, 200, 100, 0.3);
      top: -15px; right: 5px;
      animation: floatP4 3.8s ease-in-out infinite 1.5s;
    }
    .magic-particle.p5 {
      width: 7px; height: 7px;
      background: rgba(180, 230, 200, 0.5);
      box-shadow: 0 0 10px 2px rgba(180, 230, 200, 0.3);
      top: 10px; left: -30px;
      animation: floatP5 5.5s ease-in-out infinite 2s;
    }

    @keyframes floatP1 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
      20% { opacity: 0.8; }
      50% { transform: translate(15px, -20px) scale(1.3); opacity: 1; }
      80% { opacity: 0.6; }
    }
    @keyframes floatP2 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
      20% { opacity: 0.7; }
      50% { transform: translate(-12px, -18px) scale(1.4); opacity: 1; }
      80% { opacity: 0.5; }
    }
    @keyframes floatP3 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
      25% { opacity: 0.8; }
      50% { transform: translate(20px, -15px) scale(0.7); opacity: 0.6; }
      75% { transform: translate(-5px, -25px) scale(1.2); opacity: 1; }
    }
    @keyframes floatP4 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
      30% { opacity: 0.6; }
      60% { transform: translate(-18px, -12px) scale(1.5); opacity: 1; }
      90% { opacity: 0.4; }
    }
    @keyframes floatP5 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
      15% { opacity: 0.7; }
      45% { transform: translate(10px, -22px) scale(1.1); opacity: 1; }
      75% { transform: translate(20px, -8px) scale(0.8); opacity: 0.5; }
    }

    /* 🖥️ 桌機大螢幕微調 */
    @media (min-width: 1024px) {
      #bookContainer {
        width: 650px;
        height: 420px;
      }
    }

    /* 📱 超小螢幕微調 */
    @media (max-width: 400px) {
      body {
        padding: 2vh 3vw;
      }
      #bookContainer {
        height: 45vh;
      }
    }
  </style>
</head>

    <span class="magic-particle p4"></span>

      <span class="page-gold-frame"></span>

  <div id="prompt">想好你要問的問題，我會給你答案</div>
  <button id="flipButton" onclick="revealAnswer()">翻開</button>

      "這答案需要VIP才能解鎖。", "系統偵測到你在糾結。", "不如去吃個火鍋冷靜一下。", "答案比你想的還複雜。", "這個問題，我給滿分。",
      "請在心中默念三遍再問。", "答案正在編譯中...", "你是不是該去睡了？", "這個嘛...看天意吧。", "答案已讀不回。",
      "答案是肯定的", "我覺得不是", "問得很好，下次不要再問。", "宇宙剛剛已讀，但它裝忙。", "水晶球說它今天不加班。",
      "這題要先問貓，貓不同意就算了。", "命運正在轉圈圈，請稍候。", "答案藏在冰箱第三層。", "先按讚訂閱，答案才會出現。", "你的問題讓魔法書想關機。",
      "可以試試，但請先買保險。", "答案被風吹走了，可能在隔壁縣市。", "這不是問題，是人生的卡關任務。", "根據玄學統計：大概有點玄。", "魔法書建議你先吃點甜的。",
      "如果今天是星期八，那就可以。", "這答案需要等月亮登入。", "我剛剛算了一下，算到一半餓了。", "命運說：你開心就好。", "這個答案目前缺貨中。"
    ];

    let isOpen = false;
    let hasOpenedBefore = false;
    let audioCtx;

    function revealAnswer() {
      const book = document.getElementById("book");
      const answerBoxInner = document.getElementById("answer").querySelector("div");
      const flipButton = document.getElementById("flipButton");

      if (isOpen) {
        book.classList.remove("opened", "opening", "glow");
        answerBoxInner.innerText = "";
        isOpen = false;
        setTimeout(() => {
          showAnswer(book, answerBoxInner, flipButton);
        }, 800); // 等待書本合上動畫
      } else {
        showAnswer(book, answerBoxInner, flipButton);
      }
    }

    function playShortMelody() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (!audioCtx) {
        console.warn("Web Audio API not supported in this browser.");
        return;
      }

      function tone(freq, delay, duration = 0.2, volume = 0.15) {
        if (!audioCtx || freq === 0) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        osc.type = "square";
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        gain.gain.setValueAtTime(volume, audioCtx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + delay + duration * 0.9); // 讓音尾稍微快一點結束

        osc.start(audioCtx.currentTime + delay);
        osc.stop(audioCtx.currentTime + delay + duration);
      }

      // 音符頻率 - Never Gonna Give You Up (Rickroll!)
      // 正確的旋律：F4 G4 A#4 G4 D5 D5 C5
      const F4 = 349.23;   // Fa
      const G4 = 392.00;   // Sol
      const As4 = 466.16;  // A# (La#/降Ti)
      const D5 = 587.33;   // Re'
      const C5 = 523.25;   // Do'

      // Never Gonna Give You Up 主旋律 - "Never gonna give you up"
      // F4 G4 A#4 G4 D5 D5 C5 (前四個音快一點，後三個音正常)
      const melody = [
        { freq: F4, dur: 0.6 },    // F4 - Ne- (短)
        { freq: G4, dur: 0.6 },    // G4 - ver (短)
        { freq: As4, dur: 0.6 },   // A#4 - gon- (短)
        { freq: G4, dur: 0.6 },    // G4 - na (短)
        { freq: D5, dur: 1 },      // D5 - give (正常)
        { freq: D5, dur: 1 },      // D5 - you (正常)
        { freq: C5, dur: 1.5 }     // C5 - up (稍長)
      ];

      const baseSingleDuration = 0.30; // 四分音符的基礎時長 (秒) - Rickroll 節奏
      const shortPauseBetweenNotes = 0.03; // 音符間的微小停頓

      let currentTime = 0;
      melody.forEach(note => {
        const notePlayDuration = (note.dur * baseSingleDuration) - shortPauseBetweenNotes;
        if (note.freq > 0 && notePlayDuration > 0) {
          tone(note.freq, currentTime, notePlayDuration);
        }
        currentTime += (note.dur * baseSingleDuration);
      });
    }

    function burstHearts() {
      const emojis = ["❤️", "💕", "💗", "💖", "💝", "🩷", "🥰"];
      for (let i = 0; i < 30; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        heart.style.left = (Math.random() * 90 + 5) + "%";
        heart.style.top = (Math.random() * 60 + 20) + "%";
        heart.style.fontSize = (Math.random() * 20 + 16) + "px";
        heart.style.animationDelay = (Math.random() * 1.5) + "s";
        heart.style.animationDuration = (Math.random() * 1.5 + 2.5) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
      }
    }

    function randomRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    function setPercentVar(el, name, min, max) {
      el.style.setProperty(name, randomRange(min, max).toFixed(1) + "%");
    }

    function applyPageWeathering(answerEl) {
      answerEl.classList.remove("weathered", "wear-se", "wear-nw", "wear-ne");

      // 白色古書頁只保留柔和邊緣泛黃，不產生筆記本感的線條/點點。
      if (Math.random() < 0.5) {
        setPercentVar(answerEl, "--smudge-x", 1, 8);
      } else {
        setPercentVar(answerEl, "--smudge-x", 92, 99);
      }
      setPercentVar(answerEl, "--smudge-y", 16, 84);
      answerEl.style.setProperty("--smudge-o", randomRange(0.06, 0.12).toFixed(2));

      // 低機率加極淡邊角舊化；不畫可見裂線。
      const wearRoll = Math.random();
      if (wearRoll < 0.25) {
        const variants = ["wear-se", "wear-nw", "wear-ne"];
        const variant = variants[Math.floor(Math.random() * variants.length)];
        answerEl.classList.add(variant);

        if (variant === "wear-se") {
          setPercentVar(answerEl, "--chip-x", 94.5, 98);
          setPercentVar(answerEl, "--chip-y", 91.5, 97);
          answerEl.style.setProperty("--chip-from", randomRange(318, 340).toFixed(0) + "deg");
          answerEl.style.setProperty("--crack-angle", randomRange(136, 154).toFixed(0) + "deg");
        } else if (variant === "wear-nw") {
          setPercentVar(answerEl, "--chip-x", 2, 6);
          setPercentVar(answerEl, "--chip-y", 3, 9);
          answerEl.style.setProperty("--chip-from", randomRange(132, 154).toFixed(0) + "deg");
          answerEl.style.setProperty("--crack-angle", randomRange(28, 45).toFixed(0) + "deg");
        } else {
          setPercentVar(answerEl, "--chip-x", 94, 98);
          setPercentVar(answerEl, "--chip-y", 3, 9);
          answerEl.style.setProperty("--chip-from", randomRange(214, 236).toFixed(0) + "deg");
          answerEl.style.setProperty("--crack-angle", randomRange(118, 136).toFixed(0) + "deg");
        }
      }

      answerEl.classList.add("weathered");
    }

    function showAnswer(book, answerBoxInner, flipButton) {
      const randomAnswer = answers[Math.floor(Math.random() * answers.length)];
      book.classList.add("opening");
      isOpen = true;

      book.classList.add("glow");
      setTimeout(() => book.classList.remove("glow"), 1500);

      if (navigator.vibrate) navigator.vibrate([80, 40, 80, 40, 80]);

      playShortMelody(); // 播放簡短旋律

      setTimeout(() => {
        book.classList.remove("opening");
        book.classList.add("opened");
        answerBoxInner.innerText = "答案：\n\n" + randomAnswer;

        // 🌫️ 神秘掃光
        const answerEl = document.getElementById("answer");
        answerEl.classList.add("revealing");
        setTimeout(() => answerEl.classList.remove("revealing"), 2000);

        // 📜 隨機皺紋（每頁不同紙紋）
        answerEl.classList.remove("w2", "w3", "w4");
        const wrinkle = Math.random();
        if (wrinkle < 0.25) { answerEl.classList.add("w2"); }
        else if (wrinkle < 0.5) { answerEl.classList.add("w3"); }
        else if (wrinkle < 0.75) { answerEl.classList.add("w4"); }
        // else: 預設皺紋（什麼都不加）

        // 🕯️ 隨機邊緣斑駁、小裂痕、小污點（每次翻頁都不同，裂痕不是固定出現）
        applyPageWeathering(answerEl);

        if (randomAnswer === "爸爸給你一個抱抱") {
          burstHearts();
        }

        if (!hasOpenedBefore) {
          hasOpenedBefore = true;
          flipButton.innerText = "再翻一次";
        }
      }, 1000); // 等待書本動畫
    }
  </script>
