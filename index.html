<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>答案之書</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:wght@400;600;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #1d1a1a;
      font-family: "Cormorant Garamond", "Noto Serif SC", serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3vh 5vw;
      color: #fff;
      min-height: 100vh;
    }

    #bookContainer {
      position: relative;
      width: min(90vw, 650px);
      height: min(55vh, 420px);
      perspective: 1200px;
      margin-top: 2vh;
      flex-shrink: 0;
    }

    #book {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #1e3a2f 0%, #2d5a46 40%, #1e3a2f 100%);
      border: 6px solid #c9a84c;
      border-radius: 12px;
      box-shadow:
        0 0 30px rgba(201, 168, 76, 0.25),
        inset 0 0 80px rgba(0, 0, 0, 0.3),
        inset 0 0 30px rgba(201, 168, 76, 0.08);
      color: transparent;
      font-size: clamp(1.5rem, 5vw, 3rem);
      font-family: "Noto Serif SC", "Cinzel Decorative", serif;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 1s ease-in-out, background 0.5s, color 0.5s;
      transform-origin: left;
      backface-visibility: hidden;
      position: relative;
      z-index: 2;
      text-align: center;
      background-clip: padding-box;
    }

    /* 燙金文字效果 */
    #book::before {
      content: "答案之書";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: inherit;
      font-family: inherit;
      letter-spacing: inherit;
      background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      z-index: 3;
      pointer-events: none;
      text-shadow: none;
    }

    /* 書邊角落裝飾：四角金線 */
    #book::after {
      content: "";
      position: absolute;
      inset: 8px;
      border: 2px solid rgba(201, 168, 76, 0.35);
      border-radius: 6px;
      pointer-events: none;
      z-index: 1;
    }

    /* 四角花飾 */
    #book .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #c9a84c;
      border-style: solid;
      z-index: 4;
      pointer-events: none;
      opacity: 0.6;
    }
    #book .corner.tl { top: 14px; left: 14px; border-width: 3px 0 0 3px; }
    #book .corner.tr { top: 14px; right: 14px; border-width: 3px 3px 0 0; }
    #book .corner.bl { bottom: 14px; left: 14px; border-width: 0 0 3px 3px; }
    #book .corner.br { bottom: 14px; right: 14px; border-width: 0 3px 3px 0; }

    #book.opening {
      transform: rotateY(-160deg);
    }

    #book.opened {
      transform: rotateY(-160deg);
      background: linear-gradient(160deg, #4a3d30 0%, #3d3227 50%, #4a3d30 100%);
      color: #e8dcc8;
      border-color: #8a7a60;
    }
    #book.opened::before {
      display: none;
    }
    #book.opened .corner {
      opacity: 0;
    }
    #book.opened::after {
      display: none;
    }

    #answer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 8% 5%;
      box-sizing: border-box;
      font-size: clamp(1.1rem, 4vw, 2rem);
      color: #e8dcc8;
      background:
        /* 紙張紋理噪點 */
        repeating-conic-gradient(rgba(60,48,35,0.15) 0% 25%, transparent 0% 50%) 0 0 / 4px 4px,
        /* 邊緣舊化暗角 */
        radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.3) 100%),
        /* 基底暗色舊紙 */
        linear-gradient(170deg, #5a4a38 0%, #4a3d30 40%, #3d3227 100%);
      display: none;
      z-index: 1;
      border-radius: 10px;
      box-shadow:
        inset 0 0 60px rgba(0, 0, 0, 0.3),
        inset 0 0 15px rgba(100, 80, 50, 0.15);
      text-align: center;
      overflow: auto;
    }

    /* 💥 裂痕效果 - 邊緣自然破損（隨機出現） */
    #answer.cracked::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      border-radius: 10px;
      background:
        /* 右下角小缺角 */
        conic-gradient(from 330deg at 95% 93%,
          transparent 0deg, transparent 10deg,
          rgba(30,20,10,0.3) 10deg, rgba(30,20,10,0.4) 12deg,
          rgba(30,20,10,0.2) 14deg, transparent 16deg
        ),
        /* 邊緣細紋 - 右下 */
        linear-gradient(150deg,
          transparent 88%, rgba(30,20,10,0.2) 88.2%,
          transparent 88.5%
        );
      mix-blend-mode: multiply;
    }

    #book.opened+#answer {
      display: block;
    }

    #answer>div {
      width: 100%;
      padding: 5%;
      box-sizing: border-box;
      overflow-wrap: break-word;
      word-wrap: break-word;
      line-height: 1.7;
      font-family: "Cormorant Garamond", "Noto Serif SC", serif;
      letter-spacing: 0.05em;
    }

    /* 🌫️ 神秘翻頁掃光 */
    @keyframes magicReveal {
      0% { opacity: 1; transform: translateX(-100%); }
      40% { opacity: 0.7; }
      100% { opacity: 0; transform: translateX(120%); }
    }
    #answer.revealing {
      overflow: hidden;
    }
    #answer.revealing::before {
      content: '';
      position: absolute;
      top: 5%; left: 0;
      width: 35%;
      height: 90%;
      background: linear-gradient(90deg, 
        transparent 0%, 
        rgba(255,215,0,0.04) 30%, 
        rgba(255,215,0,0.08) 50%, 
        rgba(255,215,0,0.04) 70%, 
        transparent 100%
      );
      pointer-events: none;
      z-index: 4;
      border-radius: 10px;
      animation: magicReveal 1.8s ease-out forwards;
    }

    /* 📜 隨機皺紋變化 */
    /* 皺紋1：預設（不變） */
    /* 皺紋2：橫向紙纖維 + 左側暗角 */
    #answer.w2 {
      background:
        repeating-linear-gradient(0deg, rgba(50,38,25,0.2) 0px, transparent 1px, transparent 6px) 0 0 / 100% 6px,
        radial-gradient(ellipse at 30% 50%, transparent 50%, rgba(0,0,0,0.35) 100%),
        linear-gradient(170deg, #5a4a38 0%, #4a3d30 40%, #3d3227 100%);
    }
    /* 皺紋3：粗細交錯紙紋 + 上方暗角 */
    #answer.w3 {
      background:
        repeating-linear-gradient(90deg, rgba(60,48,35,0.12) 0%, transparent 2%, transparent 5%),
        repeating-linear-gradient(0deg, rgba(40,30,20,0.1) 0px, transparent 1px, transparent 8px),
        radial-gradient(ellipse at 50% 30%, transparent 45%, rgba(0,0,0,0.3) 100%),
        linear-gradient(180deg, #5e4d3a 0%, #4a3d30 50%, #3d3227 100%);
    }
    /* 皺紋4：斑駁黴點 + 右下暗角 */
    #answer.w4 {
      background:
        radial-gradient(circle 2px, rgba(60,44,28,0.25) 40%, transparent 0%) 0 0 / 8px 8px,
        radial-gradient(ellipse at 70% 70%, transparent 40%, rgba(0,0,0,0.3) 100%),
        linear-gradient(160deg, #584733 0%, #4a3d30 50%, #3d3227 100%);
    }

    #prompt {
      margin-top: clamp(1rem, 3vh, 1.5rem);
      font-size: clamp(0.9rem, 3.5vw, 1.4rem);
      color: #ccc;
      text-align: center;
      max-width: 600px;
    }

    button {
      margin-top: clamp(1rem, 2vh, 1.5rem);
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      padding: clamp(8px, 1.5vw, 14px) clamp(24px, 4vw, 40px);
      background-color: #fdd835;
      color: #3e2723;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #fbc02d;
    }

    @keyframes glow {
      0% {
        box-shadow: 0 0 0 rgba(255, 255, 153, 0.0);
      }

      50% {
        box-shadow: 0 0 80px 40px rgba(255, 255, 153, 0.6);
      }

      100% {
        box-shadow: 0 0 0 rgba(255, 255, 153, 0.0);
      }
    }

    #book.glow {
      animation: glow 1.5s ease-out;
    }

    /* 💕 愛心特效 */
    .heart {
      position: fixed;
      pointer-events: none;
      font-size: 24px;
      z-index: 999;
      animation: heartFloat 3s ease-out forwards;
      opacity: 0;
    }

    @keyframes heartFloat {
      0% {
        opacity: 1;
        transform: translateY(0) scale(0.5) rotate(0deg);
      }
      50% {
        opacity: 1;
        transform: translateY(-40vh) scale(1.2) rotate(20deg);
      }
      100% {
        opacity: 0;
        transform: translateY(-80vh) scale(0.8) rotate(-10deg);
      }
    }

    /* ✨ 魔法漂浮粒子 */
    h1 {
      position: relative;
      display: inline-block;
    }
    .magic-particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      filter: blur(2px);
    }
    .magic-particle.p1 {
      width: 10px; height: 10px;
      background: rgba(255, 215, 0, 0.7);
      box-shadow: 0 0 12px 3px rgba(255, 215, 0, 0.4);
      top: -10px; left: -20px;
      animation: floatP1 4s ease-in-out infinite;
    }
    .magic-particle.p2 {
      width: 6px; height: 6px;
      background: rgba(150, 200, 255, 0.6);
      box-shadow: 0 0 10px 2px rgba(150, 200, 255, 0.3);
      top: 5px; right: -25px;
      animation: floatP2 5s ease-in-out infinite 0.5s;
    }
    .magic-particle.p3 {
      width: 8px; height: 8px;
      background: rgba(200, 150, 255, 0.6);
      box-shadow: 0 0 10px 2px rgba(200, 150, 255, 0.3);
      top: -5px; left: 10px;
      animation: floatP3 4.5s ease-in-out infinite 1s;
    }
    .magic-particle.p4 {
      width: 5px; height: 5px;
      background: rgba(255, 200, 100, 0.6);
      box-shadow: 0 0 8px 2px rgba(255, 200, 100, 0.3);
      top: -15px; right: 5px;
      animation: floatP4 3.8s ease-in-out infinite 1.5s;
    }
    .magic-particle.p5 {
      width: 7px; height: 7px;
      background: rgba(180, 230, 200, 0.5);
      box-shadow: 0 0 10px 2px rgba(180, 230, 200, 0.3);
      top: 10px; left: -30px;
      animation: floatP5 5.5s ease-in-out infinite 2s;
    }

    @keyframes floatP1 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
      20% { opacity: 0.8; }
      50% { transform: translate(15px, -20px) scale(1.3); opacity: 1; }
      80% { opacity: 0.6; }
    }
    @keyframes floatP2 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
      20% { opacity: 0.7; }
      50% { transform: translate(-12px, -18px) scale(1.4); opacity: 1; }
      80% { opacity: 0.5; }
    }
    @keyframes floatP3 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
      25% { opacity: 0.8; }
      50% { transform: translate(20px, -15px) scale(0.7); opacity: 0.6; }
      75% { transform: translate(-5px, -25px) scale(1.2); opacity: 1; }
    }
    @keyframes floatP4 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
      30% { opacity: 0.6; }
      60% { transform: translate(-18px, -12px) scale(1.5); opacity: 1; }
      90% { opacity: 0.4; }
    }
    @keyframes floatP5 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
      15% { opacity: 0.7; }
      45% { transform: translate(10px, -22px) scale(1.1); opacity: 1; }
      75% { transform: translate(20px, -8px) scale(0.8); opacity: 0.5; }
    }

    /* 🖥️ 桌機大螢幕微調 */
    @media (min-width: 1024px) {
      #bookContainer {
        width: 650px;
        height: 420px;
      }
    }

    /* 📱 超小螢幕微調 */
    @media (max-width: 400px) {
      body {
        padding: 2vh 3vw;
      }
      #bookContainer {
        height: 45vh;
      }
    }
  </style>
</head>

<body>

  <h1 style="font-size: clamp(1.8rem, 6vw, 3.5rem);">
    <span class="magic-particle p1"></span>
    <span class="magic-particle p2"></span>
    <span class="magic-particle p3"></span>
    <span class="magic-particle p4"></span>
    <span class="magic-particle p5"></span>
    📖 答案之書
  </h1>
  <div id="bookContainer">
    <div id="book">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
      答案之書
    </div>
    <div id="answer">
      <div></div>
    </div>
  </div>

  <div id="prompt">想好你要問的問題，我會給你答案</div>
  <button id="flipButton" onclick="revealAnswer()">翻開</button>

  <script>
    const answers = [ // 100個沙雕答案 + 驚喜答案
      "最好是多了解。", "明天再看看。", "介於是與不是之間。", "答案藏在你心裡。", "先吃飯，再想。",
      "這問題太深奧了。", "就...隨便吧。", "聽天由命，躺平有理。", "有可能，也有不可能。", "等等再問會不會比較好？",
      "選擇障礙已啟動。", "問這種問題...我也很難。", "命運在跳針中。", "請轉身三圈再問一次。", "依照月亮的心情決定。",
      "可以，但不建議。", "感覺像是，也可能不是。", "如果你堅持，那就當然不行。", "這答案今天休假。", "走一步算一步。",
      "你需要一杯奶茶冷靜一下。", "現在知道未來，會不會太早？", "已送出申請，靜候宇宙回覆。", "再問下去會被宇宙封鎖喔。", "這答案要收費，請先課金。",
      "這問題...有點沙雕喔。", "我猜你會後悔知道答案。", "答案太危險，已被銷毀。", "請自行 Google。", "比起答案，也許你更需要抱抱。",
      "喵？（貓咪路過）", "先去鏟貓砂再來問。", "系統過熱，請稍後。", "我的水晶球正在更新韌體。", "問問神奇海螺吧！",
      "你確定要問這個？", "今天水逆，不宜占卜。", "答案在風中，可惜今天沒風。", "不如去睡覺，夢裡什麼都有。", "這個問題，讓我想想...算了不值得想。",
      "你猜啊！猜對了...也沒獎勵。", "42。(但這是另一個問題的答案)", "關我P事？", "你是不是想太多了？", "答案正在Loading...99%...卡住了。",
      "擲個硬幣吧，正面就...反面就...", "我覺得你只是想找人聊天。", "這個嘛...很難評。", "下一位！", "此答案已過期，請洽詢客服。",
      "可能需要一點魔法。", "嗶嗶！偵測到問題過於抽象。", "我只是一個網頁，別為難我。", "喝口水，壓壓驚。", "答案售罄，明日請早。",
      "那是肯定的", // 驚喜答案！
      "爸爸給你一個抱抱", // 愛心特效！
      "你人好好，但答案我不知道。", "去問隔壁老王看看。", "這個問題的複雜度超出了我的薪水。", "我的AI累了，想下班。", "答案被外星人劫走了。",
      "你是不是忘了開勿擾模式？", "這個問題，它...它自己走掉了！", "讓我算一下...嗯...大概是那樣吧。", "佛曰：不可說，不可說。", "要不要試試看反過來問？",
      "今天的風兒有點喧囂。", "答案在鹹酥雞的袋子裡。", "請保持社交距離，謝謝。", "你是不是想騙我唱歌？", "這個問題好無聊，下一個！",
      "CPU表示：我不想處理這個。", "記憶體不足，無法回答。", "答案正在煮，請耐心等候。", "不然你給我一個答案？", "先去洗把臉清醒一下。",
      "你是不是偷偷熬夜了？", "這個問題，我選擇放棄。", "要不要點播一首歌？", "答案可能在你的宵夜裡。", "今天的 KPI 還沒達標，沒空回答。",
      "再吵，就把你丟到資源回收桶！", "這個問題太哲學了，我頭痛。", "我覺得你需要的是假期，不是答案。", "去公園跑三圈，答案就浮現了。", "不然...我們來玩剪刀石頭布？",
      "這個問題太難了，我選擇被格式化。", "別問了，再問就是愛過。", "答案正在放空，勿擾。", "請充值信仰獲得解答。", "你是不是想測試我的智商？不高，謝謝。",
      "答案在海底撈，自己去撈。", "我的能量條快耗盡了。", "嗶啵嗶啵...訊號不良...", "這問題太油了，我先去去油。", "你是不是想對我做什麼？",

      "看起來不太妙喔。", "你的直覺是對的。", "再等等吧，時機未到。", "這個嘛...一言難盡。", "你想聽真話還是假話？",
      "答案在你的錢包裡。", "先去運動一下再說。", "這需要三思而後行。", "隨緣吧，強求不來。", "你已經知道答案了，不是嗎？",
      "這個問題有毒。", "建議你找專業人士。", "答案正在趕來的路上。", "可能性：50/50。", "不要問，很恐怖。",
      "你的問題讓我陷入沉思。", "這個...要看你的造化。", "答案藏在細節裡。", "先把手機放下。", "你確定要繼續問嗎？",
      "這答案需要VIP才能解鎖。", "系統偵測到你在糾結。", "不如去吃個火鍋冷靜一下。", "答案比你想的還複雜。", "這個問題，我給滿分。",
      "請在心中默念三遍再問。", "答案正在編譯中...", "你是不是該去睡了？", "這個嘛...看天意吧。", "答案已讀不回。"
    ];

    let isOpen = false;
    let hasOpenedBefore = false;
    let audioCtx;

    function revealAnswer() {
      const book = document.getElementById("book");
      const answerBoxInner = document.getElementById("answer").querySelector("div");
      const flipButton = document.getElementById("flipButton");

      if (isOpen) {
        book.classList.remove("opened", "opening", "glow");
        answerBoxInner.innerText = "";
        isOpen = false;
        setTimeout(() => {
          showAnswer(book, answerBoxInner, flipButton);
        }, 800); // 等待書本合上動畫
      } else {
        showAnswer(book, answerBoxInner, flipButton);
      }
    }

    function playShortMelody() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (!audioCtx) {
        console.warn("Web Audio API not supported in this browser.");
        return;
      }

      function tone(freq, delay, duration = 0.2, volume = 0.15) {
        if (!audioCtx || freq === 0) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        osc.type = "square";
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        gain.gain.setValueAtTime(volume, audioCtx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + delay + duration * 0.9); // 讓音尾稍微快一點結束

        osc.start(audioCtx.currentTime + delay);
        osc.stop(audioCtx.currentTime + delay + duration);
      }

      // 音符頻率 - Never Gonna Give You Up (Rickroll!)
      // 正確的旋律：F4 G4 A#4 G4 D5 D5 C5
      const F4 = 349.23;   // Fa
      const G4 = 392.00;   // Sol
      const As4 = 466.16;  // A# (La#/降Ti)
      const D5 = 587.33;   // Re'
      const C5 = 523.25;   // Do'

      // Never Gonna Give You Up 主旋律 - "Never gonna give you up"
      // F4 G4 A#4 G4 D5 D5 C5 (前四個音快一點，後三個音正常)
      const melody = [
        { freq: F4, dur: 0.6 },    // F4 - Ne- (短)
        { freq: G4, dur: 0.6 },    // G4 - ver (短)
        { freq: As4, dur: 0.6 },   // A#4 - gon- (短)
        { freq: G4, dur: 0.6 },    // G4 - na (短)
        { freq: D5, dur: 1 },      // D5 - give (正常)
        { freq: D5, dur: 1 },      // D5 - you (正常)
        { freq: C5, dur: 1.5 }     // C5 - up (稍長)
      ];

      const baseSingleDuration = 0.30; // 四分音符的基礎時長 (秒) - Rickroll 節奏
      const shortPauseBetweenNotes = 0.03; // 音符間的微小停頓

      let currentTime = 0;
      melody.forEach(note => {
        const notePlayDuration = (note.dur * baseSingleDuration) - shortPauseBetweenNotes;
        if (note.freq > 0 && notePlayDuration > 0) {
          tone(note.freq, currentTime, notePlayDuration);
        }
        currentTime += (note.dur * baseSingleDuration);
      });
    }

    function burstHearts() {
      const emojis = ["❤️", "💕", "💗", "💖", "💝", "🩷", "🥰"];
      for (let i = 0; i < 30; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        heart.style.left = (Math.random() * 90 + 5) + "%";
        heart.style.top = (Math.random() * 60 + 20) + "%";
        heart.style.fontSize = (Math.random() * 20 + 16) + "px";
        heart.style.animationDelay = (Math.random() * 1.5) + "s";
        heart.style.animationDuration = (Math.random() * 1.5 + 2.5) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
      }
    }

    function showAnswer(book, answerBoxInner, flipButton) {
      const randomAnswer = answers[Math.floor(Math.random() * answers.length)];
      book.classList.add("opening");
      isOpen = true;

      book.classList.add("glow");
      setTimeout(() => book.classList.remove("glow"), 1500);

      if (navigator.vibrate) navigator.vibrate([80, 40, 80, 40, 80]);

      playShortMelody(); // 播放簡短旋律

      setTimeout(() => {
        book.classList.remove("opening");
        book.classList.add("opened");
        answerBoxInner.innerText = "答案：\n\n" + randomAnswer;

        // 🌫️ 神秘掃光
        const answerEl = document.getElementById("answer");
        answerEl.classList.add("revealing");
        setTimeout(() => answerEl.classList.remove("revealing"), 2000);

        // 📜 隨機皺紋（每頁不同紙紋）
        answerEl.classList.remove("w2", "w3", "w4");
        const wrinkle = Math.random();
        if (wrinkle < 0.25) { answerEl.classList.add("w2"); }
        else if (wrinkle < 0.5) { answerEl.classList.add("w3"); }
        else if (wrinkle < 0.75) { answerEl.classList.add("w4"); }
        // else: 預設皺紋（什麼都不加）

        // 💥 隨機裂痕（約 40% 機率）
        answerEl.classList.remove("cracked");
        if (Math.random() < 0.4) {
          answerEl.classList.add("cracked");
        }

        if (randomAnswer === "爸爸給你一個抱抱") {
          burstHearts();
        }

        if (!hasOpenedBefore) {
          hasOpenedBefore = true;
          flipButton.innerText = "再翻一次";
        }
      }, 1000); // 等待書本動畫
    }
  </script>
